front:
  text: 南統大君內丹九章經序豫於開元中著玄綱論及養形論行於世詔授江州刺史辭而不受晦迹隱於驪山養胎息至元和中遊淮西遇王師討蔡賊吳元濟避亂東之於嶽遇李謫仙以斯術授豫曰此南統大君之生門也入其門則我命在我九章象陽之爻數也其文略其事簡實學道之漸階為求生之真路也又曰內丹者即此也吾今授汝愼勿泄無器識誷神靈之徒否則罹災矣九章之㫖許度後人但不授中下之才者爾故録為之序引唐元和戊戌吳筠序南統大君內丹九章經
  hash: sha256:64a8204a245ead9dd212dea32bad78d63db881525f8871e8e9cd258e7a54b435
  markers:
