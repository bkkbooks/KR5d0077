body:
  text: 賢愚異實章第一屈身問道志騰雲漢之外上士也伐壽損性甘心於幽壤之下愚蒙也大君曰人本與天地同生於虛無何天地則能齊其壽而人不能存其形是道不負人人負於道也賢愚異實清濁殊途故吾之道非升天之道集神以為道神集則內丹成存其形神光章第二常人亦以此候吉凶黃吉白凶青憂黑死餘候則不令知之去亂聲絶淫志無大醉候夜絶明左右取之若電爍而光圓大而享壽之徵也久則圓明被體如流星迸芒其道必昌大君曰先扣天鼓伏枕收光澄心瞑目想見太陽太陽在闕門上太陰在丹田外熟寢神靜神集氣正朝斗章第三歲有三元月有三七齊心端居握固瞑想如到金闕如覩宸容稽首伏拜一如朝天子之儀禮畢戰懼拱聳趨出洗滌煩慮止絶煩慮為齊心然則朝元無時夜闌於密室對北辰象行此法易感通也庚申章第四常人守此法夜不寐非本法如庚申夜於淨室具香火端居握固先扣天鼓三十六通集神畢次想身中百神皆出具冠劔威儀侍衛於前後左右訖乃引朝太上道君一如朝斗之法行之三年兵虎不能害三尸不敢守夢長材美人遺奇花異果感通之應送壽之祥也修陽德章第五為善無小大皆係於陽為惡無小大皆屬於陰積善滋大則陽氣發而為祥積惡滋深則陰氣作而為禍故希壽之士先憑陰德後迎陽報者即遐齡也大君曰如此之流皆入仙格服餌靈草容壯難老藥則為裏術則為表百神易集形可長保導引元陽章第六百關開通則五藏皆理六府俱淨則邪氣不入天鼓鳴魘穢皆去元氣行津路流通氣液所及骨髓如金神必亨暢導引畢定息鳴天鼓集神乃噓呵呼嘻呬吹之聲無令耳聞久則清氣積於內濁穢之氣消亡矣大君曰丹雖未成神已虛明元陽氣平乃人長生陰忌章第七雷電震雨大風拔樹此乃大怒鬼神皆怖是故拱立稽首凛而兢懼宴息於牀無行夫婦如否者鬼神奪算病則難愈大君曰故天威怒陰靈皆怖久則陰賊遁死籍除百神扶此之謂登福輿碎禍車習近則生章第八冶容夭壽之階也淫聲伐性之斧也珍肴卮酒亂神之藥也軒冕縉紳賁形之具也此四患靡不知之無能捨之捨之不得謂之行尸升天道逺全生道近故不如習近大君曰神集則靈氣清則輕神集氣清是謂守形是謂全生七曜感通章第九心仰七星之光足履七星之步跡勿重履四十九數回視握固扣鳴天鼓瞑目存想左龍右虎故曰我不尋真真必相隨神得真氣百靈皆護授真氣必遇至人或夢遊海山見龍獸皆白衣天子宫樓御苑是神合形命術成矣然後告元神享壽星天關無礙後序東方角亢二星列宿之長故曰壽也二星之間則天門也亦曰天關凡得道朝元皆由此門而入得此道者告元神則感通享壽星則關奏録係於天門矣功滿升天元辰接引入門則無礙豫四十年方遂一第既知命寡遂慕尋真討究仙經莫得生理因南訪茅君修真之跡登茅巔入石室先得元道真經即太上道君歸根復本號而不嗄之理也乃執其理十餘年惟攻胎息續用既勞嗟乎非眼前之睫也後再遊逢老叟曰汝欲學仙乎學仙者從塵入真如煉礦而鎔金也何不先求命術以延其生後修陰德登其漸階乎天仙也者功感上天詔授錫命乃遂輕舉而為仙人也雖達仙境猶煉真氣氣與神並故曰神仙神仙體虛故能跨鸞馭鶴乘雲氣飛騰太虛壽齊天地汝得元道真經求仙之筌蹄也其莽蕩魚兔難尋昔茅君上升留大君命術藏於山巔石室俾吾守之蓋欲傳於夙分者也汝格孤氣清必有仙骨乃出此九章授豫而去囑曰此即所求之魚兔也道非身外寶之寶之乃録其言為序以紀之仍目之曰內丹神訣矣吳筠序南統大君內丹九章經
